name: Deploy supplement-advisor to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # 비활성 상태면 워크플로우가 첫 실행에도 Pages를 허용 상태로 바꿔줍니다.
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: supplement-advisor

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
